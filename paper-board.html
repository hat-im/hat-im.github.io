<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fbfaf6;
    --surface: #ffffff;
    --border: #e8e5db;
    --border-strong: #d8d4c6;
    --text: #2b2a26;
    --text-secondary: #75726a;
    --text-tertiary: #9a978d;
    --accent: #3f6fae;
    --accent-tint: #e7edf6;
    --destructive: #b23b3b;
    --destructive-tint: #f6e9e9;
    --radius-card: 4px;
    --radius-ctrl: 6px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }

  .app { max-width: 1400px; margin: 0 auto; padding: 28px 28px 60px; }

  /* ---------- Top bar ---------- */

  .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; margin-bottom: 22px; }

  .topbar-left { flex: 1; min-width: 0; }

  h1.title { font-size: 21px; font-weight: 700; margin: 0 0 4px 0; letter-spacing: -0.01em; }

  .subtitle { font-size: 13px; color: var(--text-secondary); margin: 0; }

  .actions-menu { position: relative; flex-shrink: 0; }

  button.reset-btn { display: inline-flex; align-items: center; gap: 6px; }
  .chevron-icon { width: 10px; height: 10px; color: var(--text-tertiary); transition: transform .12s ease; }
  .actions-menu[data-open="true"] .chevron-icon { transform: rotate(180deg); }

  .actions-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    z-index: 50;
    min-width: 190px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 6px 20px rgba(30,28,20,0.12);
    padding: 6px;
  }
  .actions-dropdown.open { display: block; }

  button.dropdown-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    padding: 8px 10px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
  }
  button.dropdown-item:hover { background: #f4f2ea; }
  button.dropdown-item:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .external-icon { width: 12px; height: 12px; color: var(--text-tertiary); flex-shrink: 0; }

  button.reset-btn {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: var(--radius-ctrl);
    cursor: pointer;
    transition: border-color .12s ease, color .12s ease;
  }
  button.reset-btn:hover { border-color: var(--destructive); color: var(--destructive); }
  button.reset-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---------- Controls row ---------- */

  .controls { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }

  .search-wrap { position: relative; max-width: 420px; }

  input.search-input {
    width: 100%;
    font-family: inherit;
    font-size: 13.5px;
    padding: 9px 12px 9px 34px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-ctrl);
    background: var(--surface);
    color: var(--text);
  }
  input.search-input::placeholder { color: var(--text-tertiary); }
  input.search-input:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }

  .search-icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; color: var(--text-tertiary); pointer-events: none;
  }

  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .chip-row-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--text-tertiary); margin-right: 4px; }

  button.chip {
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 500;
    padding: 5px 11px;
    border-radius: 999px;
    border: 1px solid transparent;
    cursor: pointer;
    line-height: 1.3;
    transition: filter .1s ease, box-shadow .1s ease;
  }
  button.chip:hover { filter: brightness(0.96); }
  button.chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button.chip.active { box-shadow: inset 0 0 0 1.5px currentColor; }

  button.chip.author-chip,
  button.chip.venue-chip {
    background: var(--surface);
    color: var(--text-secondary);
    border-color: var(--border-strong);
  }
  button.chip.author-chip.active,
  button.chip.venue-chip.active {
    background: #eeece3;
    color: var(--text);
    box-shadow: inset 0 0 0 1.5px var(--border-strong);
  }

  button.chip.toggle-chip {
    background: transparent;
    color: var(--text-secondary);
    border: 1px dashed var(--border-strong);
  }
  button.chip.toggle-chip:hover { color: var(--text); border-color: var(--text-tertiary); }

  /* ---------- Progress line ---------- */

  .progress-line { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }

  .info-btn {
    width: 16px; height: 16px; border-radius: 50%;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-tertiary);
    font-size: 10px;
    font-family: inherit;
    line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
    position: relative;
  }
  .info-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .popover {
    display: none;
    position: absolute;
    top: 22px; left: 0;
    z-index: 40;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-ctrl);
    box-shadow: 0 6px 20px rgba(30,28,20,0.12);
    padding: 12px 14px;
    width: 260px;
    text-align: left;
  }
  .info-btn:hover .popover,
  .info-btn:focus-within .popover,
  .info-btn.pinned .popover { display: block; }

  .popover-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--text-tertiary); margin-bottom: 8px; }

  .mini-bar-row { margin-bottom: 7px; }
  .mini-bar-row:last-child { margin-bottom: 0; }
  .mini-bar-label { font-size: 12px; color: var(--text); margin-bottom: 3px; display: block; }
  .mini-bar-track { height: 6px; background: #f0eee6; border-radius: 3px; overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 3px; }
  .mini-bar-count { font-size: 11px; color: var(--text-tertiary); margin-left: 6px; }

  /* ---------- Board ---------- */

  .board-scroll { position: relative; overflow: visible; }

  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    align-items: start;
  }

  .column { min-width: 0; }

  .column-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; padding: 0 2px; }
  .column-title { font-size: 13px; font-weight: 600; }
  .column-count { font-size: 12px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }

  select.sort-select {
    margin-left: auto;
    font-family: inherit;
    font-size: 11.5px;
    color: var(--text-secondary);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-ctrl);
    padding: 3px 6px;
    cursor: pointer;
  }
  select.sort-select:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

  .column-drop {
    background: transparent;
    border-radius: 8px;
    min-height: 60px;
    padding: 2px;
    transition: background .12s ease;
  }
  .column-drop.drag-over { background: var(--accent-tint); }

  .empty-column { font-size: 12.5px; color: var(--text-tertiary); padding: 14px 10px; text-align: center; border: 1px dashed var(--border); border-radius: var(--radius-card); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    padding: 12px 13px;
    margin-bottom: 10px;
    cursor: grab;
    position: relative;
    transition: border-color .12s ease;
  }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: 0.4; }
  .card:hover, .card:focus-within, .card.card-focused {
    border-color: var(--border-strong);
  }
  .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .card-title { font-size: 13.5px; font-weight: 600; line-height: 1.35; margin-bottom: 4px; }

  .card-meta { font-size: 12px; color: var(--text-secondary); line-height: 1.4; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .card-keywords { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }

  .kw-pill { font-size: 10.5px; font-weight: 500; padding: 2px 8px; border-radius: 999px; line-height: 1.5; white-space: nowrap; }

  .card-actions { display: flex; gap: 6px; }

  button.action-btn {
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: var(--radius-ctrl);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
  }
  button.action-btn:hover { background: #f4f2ea; }
  button.action-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  button.action-btn.primary { background: var(--text); color: var(--surface); border-color: var(--text); }
  button.action-btn.primary:hover { background: #46453f; }

  svg.thread-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; z-index: 5; }

  /* ---------- Modal ---------- */

  .modal-backdrop {
    display: none;
    position: fixed; inset: 0; background: rgba(30,28,20,0.32);
    align-items: center; justify-content: center; z-index: 100;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 10px;
    padding: 22px 24px;
    max-width: 340px;
    width: 90%;
    box-shadow: 0 12px 32px rgba(30,28,20,0.18);
  }
  .modal-title { font-size: 15px; font-weight: 700; margin: 0 0 8px 0; }
  .modal-body { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin: 0 0 18px 0; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

  button.modal-btn {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: var(--radius-ctrl);
    cursor: pointer;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
  }
  button.modal-btn.confirm { background: var(--destructive); border-color: var(--destructive); color: #fff; }
  button.modal-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); font-size: 13.5px; }

  @media (max-width: 1100px) {
    .board { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .board { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="app" id="app">
    <div class="topbar">
      <div class="topbar-left">
        <h1 class="title">Paper board</h1>
        <p class="subtitle">Papers are linked automatically by shared keywords.</p>
      </div>
      <div class="actions-menu" id="actionsMenu">
        <button class="reset-btn" id="actionsBtn" type="button" aria-haspopup="true" aria-expanded="false">
          Actions
          <svg class="chevron-icon" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="actions-dropdown" id="actionsDropdown">
          <button class="dropdown-item" id="restoreBtn" type="button">Reset</button>
          <button class="dropdown-item" id="resetBtn" type="button">Clear</button>
          <button class="dropdown-item" id="returnToChatBtn" type="button">
            Return to chat
            <svg class="external-icon" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5.5 3.5H3.5C2.94772 3.5 2.5 3.94772 2.5 4.5V10.5C2.5 11.0523 2.94772 11.5 3.5 11.5H9.5C10.0523 11.5 10.5 11.0523 10.5 10.5V8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 2.5H11.5V6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M11.5 2.5L6.5 7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.6"/>
          <line x1="13.5" y1="13.5" x2="18" y2="18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search title, author, journal, keyword">
      </div>

      <div class="chip-row" id="keywordChips"></div>
      <div class="chip-row" id="authorChips"></div>
      <div class="chip-row" id="venueChips"></div>

      <div class="progress-line">
        <span id="progressText">0 read / 0 total</span>
        <span class="info-btn" id="infoBtn" tabindex="0">
          i
          <div class="popover" id="infoPopover">
            <div class="popover-title">Read by keyword</div>
            <div id="popoverBody"></div>
          </div>
        </span>
      </div>
    </div>

    <div class="board-scroll" id="boardScroll">
      <div class="board" id="board">
        <div class="column" data-status="to-read">
          <div class="column-header">
            <span class="column-title">To read</span><span class="column-count" id="count-to-read">0</span>
            <select class="sort-select" id="sort-to-read" data-status="to-read"></select>
          </div>
          <div class="column-drop" id="drop-to-read" data-status="to-read"></div>
        </div>
        <div class="column" data-status="suggested">
          <div class="column-header">
            <span class="column-title">Suggested</span><span class="column-count" id="count-suggested">0</span>
            <select class="sort-select" id="sort-suggested" data-status="suggested"></select>
          </div>
          <div class="column-drop" id="drop-suggested" data-status="suggested"></div>
        </div>
        <div class="column" data-status="reading">
          <div class="column-header">
            <span class="column-title">Reading</span><span class="column-count" id="count-reading">0</span>
            <select class="sort-select" id="sort-reading" data-status="reading"></select>
          </div>
          <div class="column-drop" id="drop-reading" data-status="reading"></div>
        </div>
        <div class="column" data-status="read">
          <div class="column-header">
            <span class="column-title">Read</span><span class="column-count" id="count-read">0</span>
            <select class="sort-select" id="sort-read" data-status="read"></select>
          </div>
          <div class="column-drop" id="drop-read" data-status="read"></div>
        </div>
      </div>
      <svg class="thread-overlay" id="threadOverlay"></svg>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <p class="modal-title" id="modalTitle">Clear the board</p>
      <p class="modal-body" id="modalBody">This removes every paper you've added. This can't be undone.</p>
      <div class="modal-actions">
        <button class="modal-btn" id="modalCancel" type="button">Cancel</button>
        <button class="modal-btn confirm" id="modalConfirm" type="button">Clear</button>
      </div>
    </div>
  </div>

},"energy materials":{"bg":"#f0e1db","text":"#76432d"},"fault tolerance":{"bg":"#ecdbf0","text":"#682d76"},"finance applications":{"bg":"#f0e8db","text":"#76592d"},"gpu acceleration":{"bg":"#dbeaf0","text":"#2d6076"},"high-energy physics":{"bg":"#e6f0db","text":"#52762d"},"hpc integration":{"bg":"#f0eedb","text":"#766f2d"},"hpc scheduling":{"bg":"#f0dbe8","text":"#762d59"},"infrastructure":{"bg":"#dbeef0","text":"#266c73"},"intermediate representation":{"bg":"#dbf0f0","text":"#2d7676"},"middleware":{"bg":"#e8f0db","text":"#557326"},"neutral-atom qubits":{"bg":"#dfdbf0","text":"#3c2d76"},"optimization algorithms":{"bg":"#ecf0db","text":"#68762d"},"photonic quantum computing":{"bg":"#ecdbf0","text":"#682d76"},"quantum algorithms":{"bg":"#dbeaf0","text":"#2d6076"},"quantum chemistry":{"bg":"#dbf0ea","text":"#2d7660"},"quantum circuits":{"bg":"#f0dbe8","text":"#762d59"},"quantum cryptanalysis":{"bg":"#dbf0ea","text":"#2d7660"},"quantum diagonalization":{"bg":"#e6dbf0","text":"#522d76"},"quantum machine learning":{"bg":"#dbf0f0","text":"#2d7676"},"quantum optimization":{"bg":"#dbf0dd","text":"#2d7634"},"quantum programming":{"bg":"#e6dbf0","text":"#522d76"},"quantum simulation":{"bg":"#dbeaf0","text":"#2d6076"},"qubit hardware":{"bg":"#f0dbee","text":"#762d6f"},"scalability":{"bg":"#dbe8f0","text":"#265573"},"scheduling":{"bg":"#f0f0db","text":"#707326"},"superconducting qubits":{"bg":"#e6dbf0","text":"#522d76"},"survey":{"bg":"#e6f0db","text":"#52762d"},"trapped-ion qubits":{"bg":"#dbf0f0","text":"#2d7676"},"variational algorithms":{"bg":"#dbf0e3","text":"#2d764a"},"vision":{"bg":"#f0dbdb","text":"#732629"},"workflow orchestration":{"bg":"#f0eadb","text":"#735e26"},"quantum cloning":{"bg":"#dfdbf0","text":"#3c2d76"}}}</script>
<script>
(function () {
  'use strict';

  var SEED = JSON.parse(document.getElementById('seed-data').textContent);
  var STORAGE_KEY = 'paper-board-state-v1';

  var state = {
    papers: [],
    keywordColors: {},
    activeKeywords: new Set(),
    activeAuthors: new Set(),
    activeVenues: new Set(),
    searchTerm: '',
    hoveredCardId: null,
    keywordsExpanded: false,
    authorsExpanded: false,
    venuesExpanded: false,
    sortBy: { 'to-read': 'none', suggested: 'none', reading: 'none', read: 'none' }
  };

  var AUTHOR_CHIP_MIN_COUNT = 3;
  var VENUE_CHIP_MIN_COUNT = 2;
  var STATUSES = ['to-read', 'suggested', 'reading', 'read'];
  var MAX_SUGGESTIONS = 5;

  function clone(x) { return JSON.parse(JSON.stringify(x)); }

  // ---------- Persistence ----------
  // Persists to both the artifact storage API (window.storage - the only
  // store that actually works inside Claude.ai) and localStorage (inert in
  // Claude.ai, but functional if this file is exported and opened/embedded
  // elsewhere). Each saved record carries a savedAt timestamp; whichever
  // record is newer wins if the two stores disagree.

  function readLocalStorage() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      var parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.papers) && parsed.papers.length) return parsed;
      return null;
    } catch (e) {
      return null;
    }
  }

  function writeLocalStorage(payload) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    } catch (e) {
      // inert in Claude.ai, or storage unavailable/full elsewhere - ignore
    }
  }

  async function readWindowStorage() {
    try {
      var res = await window.storage.get(STORAGE_KEY, false);
      if (res && res.value) {
        var parsed = JSON.parse(res.value);
        if (parsed && Array.isArray(parsed.papers) && parsed.papers.length) return parsed;
      }
    } catch (e) {
      // no saved state yet
    }
    return null;
  }

  async function writeWindowStorage(payload) {
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(payload), false);
    } catch (e) {
      console.error('window.storage save failed', e);
    }
  }

  async function loadState() {
    var fromLocal = readLocalStorage();
    var fromWindow = await readWindowStorage();

    var chosen = null;
    if (fromLocal && fromWindow) {
      chosen = (fromLocal.savedAt || 0) >= (fromWindow.savedAt || 0) ? fromLocal : fromWindow;
    } else {
      chosen = fromLocal || fromWindow;
    }

    if (chosen) {
      state.papers = chosen.papers;
      state.keywordColors = chosen.keywordColors || SEED.keywordColors;
      // Keep both stores in sync with whichever record won.
      writeLocalStorage(chosen);
      await writeWindowStorage(chosen);
      return;
    }

    state.papers = clone(SEED.papers);
    state.keywordColors = clone(SEED.keywordColors);
    await saveState();
  }

  async function saveState() {
    var payload = {
      papers: state.papers,
      keywordColors: state.keywordColors,
      savedAt: Date.now()
    };
    writeLocalStorage(payload);
    await writeWindowStorage(payload);
  }

  // ---------- Derived data ----------

  function allKeywords() {
    var set = new Set();
    state.papers.forEach(function (p) { p.keywords.forEach(function (k) { set.add(k); }); });
    return Array.from(set).sort();
  }

  function authorCounts() {
    var counts = {};
    state.papers.forEach(function (p) {
      p.authors.forEach(function (a) {
        if (a === 'et al.') return;
        counts[a] = (counts[a] || 0) + 1;
      });
    });
    return counts;
  }

  function filterableAuthors() {
    var counts = authorCounts();
    return Object.keys(counts)
      .filter(function (a) { return counts[a] >= AUTHOR_CHIP_MIN_COUNT; })
      .sort(function (a, b) { return counts[b] - counts[a]; });
  }

  function venueCounts() {
    var counts = {};
    state.papers.forEach(function (p) {
      if (!p.journal) return;
      counts[p.journal] = (counts[p.journal] || 0) + 1;
    });
    return counts;
  }

  function filterableVenues() {
    var counts = venueCounts();
    return Object.keys(counts)
      .filter(function (v) { return counts[v] >= VENUE_CHIP_MIN_COUNT; })
      .sort(function (a, b) { return counts[b] - counts[a]; });
  }

  function keywordColor(kw) {
    return state.keywordColors[kw] || { bg: '#eeece3', text: '#5c594f' };
  }

  function matchesSearch(paper, term) {
    if (!term) return true;
    var hay = [
      paper.title,
      paper.authors.join(' '),
      paper.journal,
      paper.keywords.join(' ')
    ].join(' ').toLowerCase();
    return hay.indexOf(term.toLowerCase()) !== -1;
  }

  function visiblePapers() {
    return state.papers.filter(function (p) {
      if (!matchesSearch(p, state.searchTerm)) return false;
      if (state.activeKeywords.size > 0) {
        var hasKw = p.keywords.some(function (k) { return state.activeKeywords.has(k); });
        if (!hasKw) return false;
      }
      if (state.activeAuthors.size > 0) {
        var hasAuthor = p.authors.some(function (a) { return state.activeAuthors.has(a); });
        if (!hasAuthor) return false;
      }
      if (state.activeVenues.size > 0) {
        if (!state.activeVenues.has(p.journal)) return false;
      }
      return true;
    });
  }

  function relatedPapers(paper, pool) {
    return pool.filter(function (other) {
      if (other.id === paper.id) return false;
      var shared = other.keywords.filter(function (k) { return paper.keywords.indexOf(k) !== -1; });
      return shared.length > 0;
    }).map(function (other) {
      var shared = other.keywords.filter(function (k) { return paper.keywords.indexOf(k) !== -1; });
      return { paper: other, sharedCount: shared.length };
    });
  }

  // ---------- Rendering ----------

  var boardEl, columns = { 'to-read': null, reading: null, read: null };

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function formatAuthors(authors) {
    return authors.join(', ');
  }

  function makeToggleChip(label, onClick) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'chip toggle-chip';
    btn.textContent = label;
    btn.addEventListener('click', onClick);
    return btn;
  }

  // Renders `buttons` into `container`. When collapsed, only as many buttons
  // as fit on a single row are shown, followed by a "See more" toggle chip
  // (also kept on that row). When expanded, all buttons are shown followed
  // by a "See less" toggle chip.
  function renderCollapsibleRow(container, buttons, expanded, onToggle) {
    container.innerHTML = '';
    container.style.flexWrap = 'wrap';

    if (buttons.length === 0) return;

    if (expanded) {
      buttons.forEach(function (b) { container.appendChild(b); });
      container.appendChild(makeToggleChip('See less', onToggle));
      return;
    }

    buttons.forEach(function (b) { container.appendChild(b); });
    var rowTop = buttons[0].offsetTop;
    var firstOverflowIndex = -1;
    for (var i = 0; i < buttons.length; i++) {
      if (buttons[i].offsetTop !== rowTop) { firstOverflowIndex = i; break; }
    }

    if (firstOverflowIndex === -1) {
      // everything already fits on one row, nothing to collapse
      return;
    }

    var toggle = makeToggleChip('See more', onToggle);
    var keepCount = firstOverflowIndex;
    while (keepCount >= 0) {
      while (container.children.length > keepCount) container.removeChild(container.lastChild);
      container.appendChild(toggle);
      if (toggle.offsetTop === rowTop) break;
      container.removeChild(toggle);
      keepCount--;
    }
  }

  function renderChips() {
    var kwContainer = document.getElementById('keywordChips');
    var keywords = allKeywords();
    var kwButtons = keywords.map(function (kw) {
      var c = keywordColor(kw);
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chip' + (state.activeKeywords.has(kw) ? ' active' : '');
      btn.style.background = c.bg;
      btn.style.color = c.text;
      btn.textContent = kw;
      btn.addEventListener('click', function () {
        if (state.activeKeywords.has(kw)) state.activeKeywords.delete(kw);
        else state.activeKeywords.add(kw);
        renderAll();
      });
      return btn;
    });
    renderCollapsibleRow(kwContainer, kwButtons, state.keywordsExpanded, function () {
      state.keywordsExpanded = !state.keywordsExpanded;
      renderChips();
    });

    var authorContainer = document.getElementById('authorChips');
    var authors = filterableAuthors();
    var authorButtons = authors.map(function (a) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chip author-chip' + (state.activeAuthors.has(a) ? ' active' : '');
      btn.textContent = a;
      btn.addEventListener('click', function () {
        if (state.activeAuthors.has(a)) state.activeAuthors.delete(a);
        else state.activeAuthors.add(a);
        renderAll();
      });
      return btn;
    });
    renderCollapsibleRow(authorContainer, authorButtons, state.authorsExpanded, function () {
      state.authorsExpanded = !state.authorsExpanded;
      renderChips();
    });

    var venueContainer = document.getElementById('venueChips');
    var venues = filterableVenues();
    var venueButtons = venues.map(function (v) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chip venue-chip' + (state.activeVenues.has(v) ? ' active' : '');
      btn.textContent = v;
      btn.addEventListener('click', function () {
        if (state.activeVenues.has(v)) state.activeVenues.delete(v);
        else state.activeVenues.add(v);
        renderAll();
      });
      return btn;
    });
    renderCollapsibleRow(venueContainer, venueButtons, state.venuesExpanded, function () {
      state.venuesExpanded = !state.venuesExpanded;
      renderChips();
    });
  }

  function renderProgress() {
    var total = state.papers.length;
    var read = state.papers.filter(function (p) { return p.status === 'read'; }).length;
    document.getElementById('progressText').textContent = read + ' read / ' + total + ' total';

    var byKeyword = {};
    state.papers.forEach(function (p) {
      p.keywords.forEach(function (kw) {
        if (!byKeyword[kw]) byKeyword[kw] = { total: 0, read: 0 };
        byKeyword[kw].total++;
        if (p.status === 'read') byKeyword[kw].read++;
      });
    });
    var keys = Object.keys(byKeyword).sort(function (a, b) { return byKeyword[b].total - byKeyword[a].total; });
    var body = document.getElementById('popoverBody');
    body.innerHTML = '';
    keys.forEach(function (kw) {
      var info = byKeyword[kw];
      var pct = info.total ? Math.round((info.read / info.total) * 100) : 0;
      var c = keywordColor(kw);
      var row = document.createElement('div');
      row.className = 'mini-bar-row';
      var label = document.createElement('span');
      label.className = 'mini-bar-label';
      label.textContent = kw;
      var track = document.createElement('div');
      track.className = 'mini-bar-track';
      var fill = document.createElement('div');
      fill.className = 'mini-bar-fill';
      fill.style.width = pct + '%';
      fill.style.background = c.text;
      track.appendChild(fill);
      var countSpan = document.createElement('span');
      countSpan.className = 'mini-bar-count';
      countSpan.textContent = info.read + '/' + info.total;
      row.appendChild(label);
      row.appendChild(track);
      row.appendChild(countSpan);
      body.appendChild(row);
    });
  }

  function getPaperUrl(paper) {
    if (!paper.doi) return null;
    if (/^10\./.test(paper.doi)) return 'https://doi.org/' + paper.doi;
    if (/^https?:\/\//.test(paper.doi)) return paper.doi;
    return null;
  }

  function actionButtonsFor(paper) {
    if (paper.status === 'to-read' || paper.status === 'suggested') {
      return [{ label: 'Start', next: 'reading', primary: true }];
    }
    if (paper.status === 'reading') {
      var actions = [{ label: 'Finish', next: 'read', primary: true }];
      if (getPaperUrl(paper)) actions.push({ label: 'Open', type: 'open', primary: false });
      return actions;
    }
    return [{ label: 'Reopen', next: 'reading', primary: false }];
  }

  function buildCard(paper) {
    var card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('draggable', 'true');
    card.setAttribute('tabindex', '0');
    card.dataset.id = paper.id;

    var title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = paper.title;
    card.appendChild(title);

    var meta = document.createElement('div');
    meta.className = 'card-meta';
    var metaParts = [];
    if (paper.authors.length) metaParts.push(formatAuthors(paper.authors));
    if (paper.year) metaParts.push(String(paper.year));
    if (paper.journal) metaParts.push(paper.journal);
    if (typeof paper.citations === 'number') metaParts.push(paper.citations + ' citations');
    meta.textContent = metaParts.join(' \u00b7 ');
    meta.title = metaParts.join(' \u00b7 ');
    card.appendChild(meta);

    var kwWrap = document.createElement('div');
    kwWrap.className = 'card-keywords';
    paper.keywords.forEach(function (kw) {
      var c = keywordColor(kw);
      var pill = document.createElement('span');
      pill.className = 'kw-pill';
      pill.style.background = c.bg;
      pill.style.color = c.text;
      pill.textContent = kw;
      kwWrap.appendChild(pill);
    });
    card.appendChild(kwWrap);

    var actionsWrap = document.createElement('div');
    actionsWrap.className = 'card-actions';
    actionButtonsFor(paper).forEach(function (a) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'action-btn' + (a.primary ? ' primary' : '');
      btn.textContent = a.label;
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        if (a.type === 'open') {
          var url = getPaperUrl(paper);
          if (url) window.open(url, '_blank', 'noopener');
          return;
        }
        setStatus(paper.id, a.next);
      });
      actionsWrap.appendChild(btn);
    });
    card.appendChild(actionsWrap);

    // Drag events
    card.addEventListener('dragstart', function (e) {
      card.classList.add('dragging');
      e.dataTransfer.setData('text/plain', paper.id);
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', function () {
      card.classList.remove('dragging');
    });

    // Hover / focus thread lines
    card.addEventListener('mouseenter', function () { state.hoveredCardId = paper.id; drawThreads(); });
    card.addEventListener('mouseleave', function () { state.hoveredCardId = null; drawThreads(); });
    card.addEventListener('focus', function () { state.hoveredCardId = paper.id; drawThreads(); });
    card.addEventListener('blur', function () { state.hoveredCardId = null; drawThreads(); });

    return card;
  }

  var SORT_OPTIONS = [
    { value: 'none', label: 'Sort: added' },
    { value: 'author', label: 'Sort: first author' },
    { value: 'year', label: 'Sort: year' },
    { value: 'citations', label: 'Sort: citations' }
  ];

  function firstAuthorSurname(paper) {
    if (!paper.authors.length) return '';
    var first = paper.authors[0];
    if (first === 'et al.') return '';
    var comma = first.indexOf(',');
    return (comma === -1 ? first : first.slice(0, comma)).trim().toLowerCase();
  }

  function sortPapers(list, sortKey) {
    var sorted = list.slice();
    if (sortKey === 'author') {
      sorted.sort(function (a, b) { return firstAuthorSurname(a).localeCompare(firstAuthorSurname(b)); });
    } else if (sortKey === 'year') {
      sorted.sort(function (a, b) { return (b.year || 0) - (a.year || 0); });
    } else if (sortKey === 'citations') {
      sorted.sort(function (a, b) { return (b.citations || 0) - (a.citations || 0); });
    }
    return sorted;
  }

  function setupSortSelects() {
    STATUSES.forEach(function (status) {
      var select = document.getElementById('sort-' + status);
      select.innerHTML = '';
      SORT_OPTIONS.forEach(function (opt) {
        var el = document.createElement('option');
        el.value = opt.value;
        el.textContent = opt.label;
        select.appendChild(el);
      });
      select.value = state.sortBy[status];
      select.addEventListener('change', function () {
        state.sortBy[status] = select.value;
        renderBoard();
      });
    });
  }

  var EMPTY_TEXT = {
    'to-read': 'No papers yet.',
    suggested: 'Nothing suggested yet.',
    reading: 'Nothing here.',
    read: 'Nothing here.'
  };

  function renderBoard() {
    var pool = visiblePapers();
    var byStatus = { 'to-read': [], suggested: [], reading: [], read: [] };
    pool.forEach(function (p) { byStatus[p.status].push(p); });

    STATUSES.forEach(function (status) {
      var dropEl = document.getElementById('drop-' + status);
      dropEl.innerHTML = '';
      var list = sortPapers(byStatus[status], state.sortBy[status]);
      document.getElementById('count-' + status).textContent = list.length;
      if (list.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'empty-column';
        empty.textContent = EMPTY_TEXT[status];
        dropEl.appendChild(empty);
        return;
      }
      list.forEach(function (p) { dropEl.appendChild(buildCard(p)); });
    });

    drawThreads();
  }

  function drawThreads() {
    var svg = document.getElementById('threadOverlay');
    svg.innerHTML = '';
    if (!state.hoveredCardId) return;

    var pool = visiblePapers();
    var hovered = pool.find(function (p) { return p.id === state.hoveredCardId; });
    if (!hovered) return;

    var related = relatedPapers(hovered, pool);
    if (related.length === 0) return;

    var mostCited = related.reduce(function (best, rel) {
      return (!best || (rel.paper.citations || 0) > (best.paper.citations || 0)) ? rel : best;
    }, null);
    var mostRecent = related.reduce(function (best, rel) {
      return (!best || (rel.paper.year || 0) > (best.paper.year || 0)) ? rel : best;
    }, null);

    var links = [];
    if (mostCited) links.push({ rel: mostCited, dashed: false });
    if (mostRecent && mostRecent.paper.id !== mostCited.paper.id) links.push({ rel: mostRecent, dashed: true });

    var scrollRect = document.getElementById('boardScroll').getBoundingClientRect();
    var hoveredEl = document.querySelector('.card[data-id="' + cssEscape(hovered.id) + '"]');
    if (!hoveredEl) return;
    var hRect = hoveredEl.getBoundingClientRect();
    var hx = hRect.left + hRect.width / 2 - scrollRect.left;
    var hy = hRect.top + hRect.height / 2 - scrollRect.top;

    links.forEach(function (link) {
      var el = document.querySelector('.card[data-id="' + cssEscape(link.rel.paper.id) + '"]');
      if (!el) return;
      var r = el.getBoundingClientRect();
      var rx = r.left + r.width / 2 - scrollRect.left;
      var ry = r.top + r.height / 2 - scrollRect.top;
      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', hx);
      line.setAttribute('y1', hy);
      line.setAttribute('x2', rx);
      line.setAttribute('y2', ry);
      line.setAttribute('stroke', '#4a4842');
      line.setAttribute('stroke-width', 2);
      line.setAttribute('stroke-opacity', '0.55');
      if (link.dashed) line.setAttribute('stroke-dasharray', '5 4');
      svg.appendChild(line);
    });
  }

  function cssEscape(s) {
    return String(s).replace(/[^a-zA-Z0-9_-]/g, function (c) {
      return '\\' + c;
    });
  }

  function applySuggestions(paper) {
    var candidates = relatedPapers(paper, state.papers).filter(function (rel) {
      return rel.paper.status === 'to-read';
    });
    candidates.sort(function (a, b) { return (b.paper.citations || 0) - (a.paper.citations || 0); });
    candidates.slice(0, MAX_SUGGESTIONS).forEach(function (rel) {
      rel.paper.status = 'suggested';
    });
  }

  function setStatus(id, status) {
    var paper = state.papers.find(function (p) { return p.id === id; });
    if (!paper) return;
    var wasRead = paper.status === 'read';
    paper.status = status;
    if (status === 'read' && !wasRead) applySuggestions(paper);
    saveState();
    renderAll();
  }

  function renderAll() {
    renderChips();
    renderProgress();
    renderBoard();
  }

  // ---------- Drop zones ----------

  function setupDropZones() {
    STATUSES.forEach(function (status) {
      var dropEl = document.getElementById('drop-' + status);
      dropEl.addEventListener('dragover', function (e) {
        e.preventDefault();
        dropEl.classList.add('drag-over');
      });
      dropEl.addEventListener('dragleave', function () {
        dropEl.classList.remove('drag-over');
      });
      dropEl.addEventListener('drop', function (e) {
        e.preventDefault();
        dropEl.classList.remove('drag-over');
        var id = e.dataTransfer.getData('text/plain');
        setStatus(id, status);
      });
    });
  }

  // ---------- Search ----------

  function setupSearch() {
    var input = document.getElementById('searchInput');
    input.addEventListener('input', function () {
      state.searchTerm = input.value;
      renderAll();
    });
  }

  // ---------- Actions dropdown (Reset / Clear / Return to chat) ----------

  var RETURN_TO_CHAT_URL = 'https://claude.ai/chat/b51476f5-ba8c-473c-a1f5-ad5cb52f4032';

  function closeActionsDropdown() {
    var menu = document.getElementById('actionsMenu');
    var dropdown = document.getElementById('actionsDropdown');
    var btn = document.getElementById('actionsBtn');
    dropdown.classList.remove('open');
    menu.setAttribute('data-open', 'false');
    btn.setAttribute('aria-expanded', 'false');
  }

  function setupActionsMenu() {
    var menu = document.getElementById('actionsMenu');
    var btn = document.getElementById('actionsBtn');
    var dropdown = document.getElementById('actionsDropdown');

    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      var isOpen = dropdown.classList.toggle('open');
      menu.setAttribute('data-open', isOpen ? 'true' : 'false');
      btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    document.addEventListener('click', function (e) {
      if (!menu.contains(e.target)) closeActionsDropdown();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeActionsDropdown();
    });

    document.getElementById('returnToChatBtn').addEventListener('click', function () {
      closeActionsDropdown();
      window.open(RETURN_TO_CHAT_URL, '_blank', 'noopener');
    });
  }

  // ---------- Confirmation modal (Clear board / Restore seed papers) ----------

  var MODAL_COPY = {
    clear: {
      title: 'Clear the board',
      body: "This removes every paper you've added. This can't be undone.",
      confirmLabel: 'Clear'
    },
    restore: {
      title: 'Reset the board',
      body: 'This replaces the board with the original papers and resets every status to to-read. This can\u2019t be undone.',
      confirmLabel: 'Reset'
    }
  };

  function setupResetModal() {
    var backdrop = document.getElementById('modalBackdrop');
    var titleEl = document.getElementById('modalTitle');
    var bodyEl = document.getElementById('modalBody');
    var confirmBtn = document.getElementById('modalConfirm');
    var pendingAction = 'clear';

    function openModal(action) {
      pendingAction = action;
      var copy = MODAL_COPY[action];
      titleEl.textContent = copy.title;
      bodyEl.textContent = copy.body;
      confirmBtn.textContent = copy.confirmLabel;
      backdrop.classList.add('open');
    }

    document.getElementById('resetBtn').addEventListener('click', function () {
      closeActionsDropdown();
      openModal('clear');
    });
    document.getElementById('restoreBtn').addEventListener('click', function () {
      closeActionsDropdown();
      openModal('restore');
    });
    document.getElementById('modalCancel').addEventListener('click', function () {
      backdrop.classList.remove('open');
    });
    backdrop.addEventListener('click', function (e) {
      if (e.target === backdrop) backdrop.classList.remove('open');
    });
    confirmBtn.addEventListener('click', async function () {
      if (pendingAction === 'restore') {
        state.papers = clone(SEED.papers);
        state.keywordColors = clone(SEED.keywordColors);
      } else {
        state.papers = [];
      }
      state.activeKeywords = new Set();
      state.activeAuthors = new Set();
      state.activeVenues = new Set();
      state.searchTerm = '';
      document.getElementById('searchInput').value = '';
      await saveState();
      backdrop.classList.remove('open');
      renderAll();
    });
  }

  // ---------- Window resize redraw ----------

  window.addEventListener('resize', function () { drawThreads(); });
  document.getElementById('boardScroll') && document.getElementById('boardScroll').addEventListener('scroll', function () { drawThreads(); });

  // ---------- Init ----------

  async function init() {
    await loadState();
    setupDropZones();
    setupSearch();
    setupResetModal();
    setupSortSelects();
    setupActionsMenu();
    renderAll();
  }

  init();
})();

</script>
</body>
</html>
