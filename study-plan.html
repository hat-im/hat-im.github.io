<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title></title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/theme.css">
<link rel="stylesheet" href="study-plan/styles/study-plan.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
</head>
<body>

<div class="topbar">
  <div>
    <h1 id="pageHeading"></h1>
    <p class="sub" id="pageSubheading"></p>
    <div class="legend-line">
      <span class="item"><svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#4a463e" stroke-width="2"/></svg> <span id="legendRequired"></span></span>
      <span class="item"><svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#a89d87" stroke-width="2" stroke-dasharray="3,3"/></svg> <span id="legendRelated"></span></span>
    </div>
    <div class="overall-progress">
      <div class="track"><div class="fill" id="overallFill"></div></div>
      <div class="count tabular" id="overallCount"></div>
      <div class="info-wrap">
        <button class="info-btn" id="infoBtn" type="button">i</button>
        <div class="info-popover" id="bookProgress"></div>
      </div>
    </div>
    <div class="chiprow" id="chipRow"></div>
  </div>
  <button class="reset-btn" id="resetBtn"></button>
</div>

<div class="toolbar">
  <input type="text" class="search-input" id="searchInput" autocomplete="off">
  <div class="suggested-next" id="suggestedNext"></div>
  <div class="toolbar-actions">
    <div class="view-toggle" role="group">
      <button class="view-btn active" id="viewBoardBtn" type="button"></button>
      <button class="view-btn" id="viewListBtn" type="button"></button>
    </div>
    <button class="crit-btn" id="critPathBtn" type="button"></button>
  </div>
</div>

<div class="board-wrap" id="boardWrap">
  <div class="board" id="board"></div>
</div>

<div class="list-wrap" id="listWrap">
  <div class="list-view" id="listView"></div>
</div>

<div class="modal-overlay" id="resetOverlay">
  <div class="modal-box">
    <h2 id="resetModalTitle"></h2>
    <p id="resetModalBody"></p>
    <div class="modal-actions">
      <button class="btn secondary" id="resetCancel"></button>
      <button class="btn danger" id="resetConfirm"></button>
    </div>
  </div>
</div>

<button class="fab-btn" id="graphFab" type="button"></button>

<div class="graph-overlay" id="graphOverlay">
  <div class="graph-panel">
    <div class="graph-header">
      <span class="graph-title" id="graphTitle"></span>
      <div class="legend-line" style="margin:0;">
        <span class="item"><svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#4a463e" stroke-width="2"/></svg> <span id="graphLegendRequired"></span></span>
        <span class="item"><svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#a89d87" stroke-width="2" stroke-dasharray="3,3"/></svg> <span id="graphLegendRelated"></span></span>
      </div>
      <button class="graph-close" id="graphClose" type="button"></button>
    </div>
    <div class="graph-canvas-wrap">
      <svg id="graphSvg"></svg>
    </div>
  </div>
</div>

<script src="shared/scripts/dual-store.js"></script>
<script src="study-plan/scripts/app.js"></script>
</body>
</html>
