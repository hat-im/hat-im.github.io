  <body>
    <div class="content-card">
      <div class="header">
        <h1 id="pageHeading"></h1>
        <p id="pageSubheading"></p>
        <div class="dedication" id="dedication"></div>
      </div>

      <div class="welcome-content">
        <div class="welcome-message" id="welcomeMessage"></div>

        <div class="instructions">
          <div class="checklist-title" id="checklistTitle"></div>
          <div class="instruction-item">
            <span class="instruction-text"></span>
          </div>
          <div class="instruction-item">
            <span class="instruction-text"></span>
          </div>
          <div class="instruction-item">
            <span class="instruction-text"></span>
          </div>
          <div class="instruction-item">
            <span class="instruction-text"></span>
          </div>
          <div class="instruction-item">
            <span class="instruction-text"></span>
          </div>
          <div class="surprise-message" id="surpriseMessage"></div>
        </div>

        <button class="entry-button" id="entryButton"></button>

        <div class="countdown" id="countdown">
          <div id="countdownText"></div>
          <button class="abort-button" id="abortButton"></button>
        </div>
      </div>

      <div class="footer-text"></div>
    </div>

    <!-- Hidden message - invisible to users but findable by developers -->
    <div class="hidden-message" id="hiddenMessage" aria-hidden="true"></div>

    <!-- Puzzle Card Toggle Button -->
    <button class="puzzle-card-toggle" id="puzzleToggle">
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M12 2C10.9 2 10 2.9 10 4V6H8C6.9 6 6 6.9 6 8V10C6 11.1 6.9 12 8 12H10V14H8C6.9 14 6 14.9 6 16V18C6 19.1 6.9 20 8 20H10V22C10 23.1 10.9 24 12 24C13.1 24 14 23.1 14 22V20H16C17.1 20 18 19.1 18 18V16C18 14.9 17.1 14 16 14H14V12H16C17.1 12 18 11.1 18 10V8C18 6.9 17.1 6 16 6H14V4C14 2.9 13.1 2 12 2Z"
          fill="currentColor"
        />
      </svg>
    </button>

    <!-- Puzzle Card -->
    <div class="puzzle-card" id="puzzleCard">
      <div class="puzzle-card-header">
        <h3 class="puzzle-card-title" id="puzzleCardTitle"></h3>
        <button class="puzzle-card-close" id="puzzleCardClose"></button>
      </div>
      <div class="puzzle-grid" id="puzzleGrid">
        <!-- Puzzle buttons will be dynamically added here -->
      </div>
    </div>

    <script src="hey/scripts/app.js"></script>
  </body>
</html>
